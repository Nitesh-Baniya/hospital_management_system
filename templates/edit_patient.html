{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h2><i class="fas fa-user-edit"></i> Edit Patient</h2>
    <p class="mb-0">Update patient information</p>
</div>

<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="fas fa-edit"></i> Patient Details</h5>
            </div>
            <div class="card-body">
                <form method="POST" class="row g-3">
                    <div class="col-md-6">
                        <label for="first_name" class="form-label">First Name</label>
                        <input type="text" name="first_name" id="first_name" class="form-control" value="{{patient.First_Name}}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="last_name" class="form-label">Last Name</label>
                        <input type="text" name="last_name" id="last_name" class="form-control" value="{{patient.Last_Name}}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="dob" class="form-label">Date of Birth</label>
                        <input type="date" name="dob" id="dob" class="form-control" value="{{patient.DOB}}" required>
                    </div>
                    <div class="col-md-6">
                        <label for="gender" class="form-label">Gender</label>
                        <select name="gender" id="gender" class="form-select" required>
                            <option value="Male" {% if patient.Gender == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if patient.Gender == 'Female' %}selected{% endif %}>Female</option>
                            <option value="Other" {% if patient.Gender == 'Other' %}selected{% endif %}>Other</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Update Patient
                        </button>
                        <a href="/patients" class="btn btn-secondary ms-2">
                            <i class="fas fa-arrow-left"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
